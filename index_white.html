<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sc1xya's Universe</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #f5f5f5;
            color: #111;
            font-family: -apple-system, BlinkMacSystemFont,
                         "SF Pro Display", "Helvetica Neue",
                         sans-serif;
        }

        .container {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 12%;
        }

        /* 新增：图片区 */
        .hero-image {
            width: 420px;
            height: 320px;
            margin-bottom: 60px;
            overflow: hidden;
            border-radius: 4px;
        }

        .hero-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 48px;
            font-weight: 650;
            letter-spacing: 1px;
            margin: 0;
        }

        .divider {
            width: 412px;
            height: 3px;
            background: #111;
            margin: 20px 0;
            opacity: 0.6;
        }

        .enter {
            margin-top: 20px;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 1px;
            opacity: 0.6;
            text-decoration: none;
            color: #111;
            transition: opacity 0.2s ease;
        }

        .enter:hover {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="container">

        <!-- 新增图片区域 -->
        <div class="hero-image">
            <img src="./sky1.png" alt="Blue sky with a small daisy in the corner">
        </div>

        <h1>Sc1xya's Universe</h1>
        <div class="divider"></div>

        <a class="enter" href="./posts.html">
            Enter
        </a>

    </div>
</body>
</html>
